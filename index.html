<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pallettoo Hiring Report</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#fcfdfe] text-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Icons = {
            Zap: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Target: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Mail: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>,
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            Award: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>,
            Globe: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
        };

        const candidates = [
            { id: 1, name: "Bhuvaneswaran T", country: "India", age: 25, maritalStatus: "Single", prevCompany: "Texmo Industries", gulfExp: "No", degree: "Diploma (Mechatronics)", indExp: "3+ Yrs", control: "Excellent", mechanics: "Excellent", welding: "Not Mentioned", handsOn: 9, final: 9, status: "Shortlisted" },
            { id: 14, name: "X. Ralish Antony", country: "India", age: 26, maritalStatus: "Single", prevCompany: "Aramco (Saudi Arabia)", gulfExp: "Yes (KSA)", degree: "B.E Mechanical Engineer", indExp: "5+ Yrs", control: "Good", mechanics: "Excellent", welding: "Not Mentioned", handsOn: 9, final: 8.5, status: "Shortlisted" },
            { id: 13, name: "Mohammad Arif Sultan", country: "India", age: 32, maritalStatus: "Married", prevCompany: "Al-Ajmi Corp (KSA)", gulfExp: "Yes (KSA)", degree: "ITI (Electrician)", indExp: "11 Yrs", control: "Excellent", mechanics: "Good", welding: "Not Mentioned", handsOn: 8.5, final: 8, status: "Shortlisted" },
            { id: 12, name: "Afzal Imam", country: "India", age: 33, maritalStatus: "Married", prevCompany: "Al-Kifah Readymix (KSA)", gulfExp: "Yes (KSA)", degree: "ITI (Electrician)", indExp: "14 Yrs", control: "Excellent", mechanics: "Good", welding: "Not Mentioned", handsOn: 8.5, final: 8, status: "Shortlisted" },
            { id: 2, name: "Mohammad Ashfaque", country: "India", age: 37, maritalStatus: "Married", prevCompany: "Al Watania Plastics", gulfExp: "Yes (KSA)", degree: "Technical (Electrical)", indExp: "12+ Yrs", control: "Excellent", mechanics: "Very Good", welding: "Not Mentioned", handsOn: 8.5, final: 8, status: "Shortlisted" },
            { id: 15, name: "Thanush A", country: "India", age: 27, maritalStatus: "Single", prevCompany: "Oil & Gas Maintenance", gulfExp: "Yes (Global)", degree: "Mechanical Technician", indExp: "5+ Yrs", control: "Medium", mechanics: "Excellent", welding: "Not Mentioned", handsOn: 8, final: 7.5, status: "Backup" },
            { id: 11, name: "Sunil Kumar", country: "India", age: 29, maritalStatus: "Single", prevCompany: "Nigeria Site Projects", gulfExp: "Yes (International)", degree: "ITI (Electrician)", indExp: "11 Yrs", control: "Good", mechanics: "Poor", welding: "Not Mentioned", handsOn: 7.5, final: 6.5, status: "Backup" },
            { id: 3, name: "Affan ME", country: "India", age: 25, maritalStatus: "Single", prevCompany: "Toyota Industries", gulfExp: "No", degree: "ITI (Trainee Maint.)", indExp: "2 Yrs", control: "Excellent", mechanics: "Medium", welding: "Not Mentioned", handsOn: 7, final: 6.5, status: "Backup" },
            { id: 4, name: "Asif Pasha", country: "India", age: 35, maritalStatus: "Married", prevCompany: "Bonn Nutrients", gulfExp: "No", degree: "Sr. Electrical Tech", indExp: "11 Yrs", control: "Excellent", mechanics: "Medium", welding: "Not Mentioned", handsOn: 7, final: 6.5, status: "Backup" },
            { id: 5, name: "Gopal Rajbhar", country: "India", age: 32, maritalStatus: "Married", prevCompany: "Mazagon Dock", gulfExp: "No", degree: "ITI (Electrical Tech)", indExp: "11 Yrs", control: "Very Good", mechanics: "Poor", welding: "Not Mentioned", handsOn: 6, final: 5, status: "Rejected" },
            { id: 6, name: "Salim Nadaf", country: "India", age: 34, maritalStatus: "Married", prevCompany: "Kompress India Ltd", gulfExp: "No (SE Asia)", degree: "ITI (Incomplete)", indExp: "10+ Yrs", control: "Poor", mechanics: "Excellent", welding: "Experienced", handsOn: 8, final: 5, status: "Rejected" },
            { id: 7, name: "Naveen Sharma", country: "India", age: 24, maritalStatus: "Single", prevCompany: "Jupiter Aluminium", gulfExp: "No", degree: "Diploma (Asst Eng)", indExp: "3.5 Yrs", control: "Medium", mechanics: "Medium", welding: "Not Mentioned", handsOn: 5, final: 4, status: "Rejected" },
            { id: 8, name: "Shaik Soharab", country: "India", age: 30, maritalStatus: "Single", prevCompany: "L&T / PRIDE Dubai", gulfExp: "No", degree: "Electrician", indExp: "5 Yrs", control: "Medium", mechanics: "None", welding: "Not Mentioned", handsOn: 3, final: 3, status: "Rejected" },
            { id: 9, name: "Mohammed Mujeeb", country: "India", age: 23, maritalStatus: "Single", prevCompany: "Maruti Suzuki", gulfExp: "No", degree: "ITI (Auto Mechanic)", indExp: "3 Yrs", control: "Poor", mechanics: "Poor", welding: "Not Mentioned", handsOn: 1, final: 1, status: "Rejected" },
            { id: 10, name: "Nashad P", country: "India", age: 28, maritalStatus: "Single", prevCompany: "Various Contracting", gulfExp: "No", degree: "Electrician", indExp: "4 Yrs", control: "Poor", mechanics: "None", welding: "Not Mentioned", handsOn: 1, final: 1, status: "Rejected" }
        ];

        const jobRequirements = [
            "3+ Years of Industrial Maintenance Experience.",
            "Classic Control, Wiring, and Electrical Cabinet Assembly.",
            "Mechanical Installation & Hydraulic/Pneumatic Repair.",
            "Ability to read technical diagrams (Electrical & Hydraulic).",
            "Welding Skills (Arc, TIG/MIG) as an added advantage.",
            "Working under pressure and team collaboration."
        ];

        function App() {
            const [searchTerm, setSearchTerm] = useState("");

            const ScoreBar = ({ score }) => {
                const color = score >= 8 ? 'bg-emerald-500' : score >= 6 ? 'bg-indigo-500' : 'bg-rose-500';
                return (
                    <div className="flex items-center gap-2 w-full min-w-[120px]">
                        <div className="flex-1 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                            <div className={`h-full ${color}`} style={{ width: `${score * 10}%` }}></div>
                        </div>
                        <span className="text-[10px] font-black text-slate-700">{score}/10</span>
                    </div>
                );
            };

            const Badge = ({ text }) => {
                const colors = {
                    "Excellent": "bg-emerald-50 text-emerald-700 border-emerald-100",
                    "Very Good": "bg-teal-50 text-teal-700 border-teal-100",
                    "Good": "bg-blue-50 text-blue-700 border-blue-100",
                    "Medium": "bg-amber-50 text-amber-700 border-amber-100",
                    "Poor": "bg-rose-50 text-rose-700 border-rose-100",
                    "Experienced": "bg-sky-50 text-sky-700 border-sky-100"
                };
                return <div className={`px-2 py-0.5 text-[9px] font-bold uppercase rounded border ${colors[text] || "bg-slate-50 text-slate-400 border-slate-200 italic"}`}>{text}</div>;
            };

            const filtered = candidates.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()) || c.prevCompany.toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="flex flex-col min-h-screen">
                    <nav className="bg-slate-900 text-white p-6 shadow-2xl">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg"><Icons.Zap /></div>
                                <div>
                                    <h1 className="text-2xl font-black uppercase tracking-tight">Pallettoo hiring candidates report</h1>
                                    <p className="text-xs font-bold text-indigo-300 tracking-[0.3em] uppercase mt-1">Pallettoo gosn Industry Co KSA</p>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-4 md:p-8 w-full flex-grow">
                        {/* Job Requirements Section */}
                        <section className="mb-8 bg-indigo-50 border border-indigo-100 rounded-[2.5rem] p-8 relative overflow-hidden shadow-sm">
                            <div className="absolute top-0 right-0 p-8 opacity-10 text-indigo-900"><Icons.Target /></div>
                            <h2 className="text-lg font-black text-indigo-900 uppercase tracking-widest mb-6 flex items-center gap-2">
                                <span className="h-1 w-8 bg-indigo-600 rounded-full"></span> Job Requirements & Criteria
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-4 gap-x-8 relative z-10">
                                {jobRequirements.map((req, i) => (
                                    <div key={i} className="flex items-start gap-3">
                                        <div className="mt-1 text-indigo-600"><Icons.Check /></div>
                                        <p className="text-sm font-semibold text-slate-700">{req}</p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Summary Statistics Cards */}
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                            {[
                                { label: "Total Pool", val: "15", icon: <Icons.Users />, col: "blue" },
                                { label: "Shortlisted", val: "05", icon: <Icons.Award />, col: "emerald" },
                                { label: "Global/Gulf Exp.", val: "06", icon: <Icons.Globe />, col: "indigo" },
                                { label: "Rejected", val: "06", icon: <Icons.Alert />, col: "rose" }
                            ].map((item, i) => (
                                <div key={i} className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm flex items-center gap-4 transition-transform hover:scale-[1.02]">
                                    <div className={`p-3.5 bg-${item.col === 'rose' ? 'red' : item.col}-50 text-${item.col === 'rose' ? 'red' : item.col}-600 rounded-2xl`}>
                                        {item.icon}
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest">{item.label}</p>
                                        <p className="text-2xl font-black text-slate-800 leading-none mt-1">{item.val}</p>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Search & Table Header */}
                        <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                            <div className="p-8 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-6">
                                <h2 className="text-xl font-black text-slate-800 tracking-tight flex items-center gap-3">
                                    <div className="w-2 h-6 bg-indigo-500 rounded-full"></div> Evaluation Matrix
                                </h2>
                                <div className="relative">
                                    <input 
                                        type="text" 
                                        placeholder="Search by name, company..." 
                                        className="w-full md:w-80 pl-6 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>

                            <div className="overflow-x-auto custom-scrollbar">
                                <table className="w-full text-left min-w-[1000px]">
                                    <thead>
                                        <tr className="bg-slate-50/50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                            <th className="px-8 py-5">Candidate Details</th>
                                            <th className="px-6 py-5">Experience Background</th>
                                            <th className="px-6 py-5 text-center">Control</th>
                                            <th className="px-6 py-5 text-center">Mech</th>
                                            <th className="px-6 py-5 text-center">Welding</th>
                                            <th className="px-6 py-5">Manual Skills</th>
                                            <th className="px-8 py-5 text-right">Rating</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {filtered.map(c => (
                                            <tr key={c.id} className={`hover:bg-slate-50/50 transition-colors ${c.status === 'Shortlisted' ? 'bg-indigo-50/40' : ''}`}>
                                                <td className="px-8 py-6">
                                                    <div className="flex flex-col">
                                                        <span className="font-black text-slate-900 text-[15px]">{c.name}</span>
                                                        <span className="text-[11px] text-slate-500 font-bold mt-1 uppercase tracking-tight">{c.degree}</span>
                                                        <div className="flex gap-1.5 mt-3">
                                                            <span className="text-[9px] bg-slate-100 px-2 py-0.5 rounded-md font-black text-slate-500 uppercase">{c.age} Yrs</span>
                                                            <span className="text-[9px] bg-slate-100 px-2 py-0.5 rounded-md font-black text-slate-500 uppercase">{c.maritalStatus}</span>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td className="px-6 py-6">
                                                    <div className="flex flex-col gap-1.5">
                                                        <span className="text-xs font-black text-slate-800">{c.indExp}</span>
                                                        <span className="text-[10px] text-slate-500 font-bold flex items-center gap-1.5 uppercase">🏢 {c.prevCompany}</span>
                                                        {c.gulfExp.includes("Yes") && <span className="text-[10px] text-emerald-600 font-black uppercase flex items-center gap-1 mt-1">🌍 {c.gulfExp}</span>}
                                                    </div>
                                                </td>
                                                <td className="px-6 py-6 text-center"><div className="flex justify-center"><Badge text={c.control} /></div></td>
                                                <td className="px-6 py-6 text-center"><div className="flex justify-center"><Badge text={c.mechanics} /></div></td>
                                                <td className="px-6 py-6 text-center"><div className="flex justify-center"><Badge text={c.welding} /></div></td>
                                                <td className="px-6 py-6"><ScoreBar score={c.handsOn} /></td>
                                                <td className="px-8 py-6 text-right">
                                                    <div className={`inline-flex items-center justify-center h-12 w-12 rounded-2xl font-black text-white text-xl shadow-xl border-b-4
                                                        ${c.final >= 8 ? 'bg-emerald-500 border-emerald-700 shadow-emerald-200' : c.final >= 6 ? 'bg-indigo-500 border-indigo-700 shadow-indigo-200' : 'bg-rose-500 border-rose-700 shadow-rose-200'}`}>
                                                        {c.final}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    <footer className="bg-white border-t border-slate-100 py-16">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="flex flex-col md:flex-row items-center justify-between bg-slate-900 rounded-[3rem] p-10 shadow-2xl relative overflow-hidden border-b-8 border-indigo-600">
                                <div className="flex items-center gap-8 z-10">
                                    <div className="h-20 w-20 bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-3xl flex items-center justify-center text-white shadow-2xl border border-indigo-400/20">
                                        <Icons.User />
                                    </div>
                                    <div className="text-center md:text-left">
                                        <p className="text-[10px] text-indigo-400 font-black uppercase tracking-[0.5em] mb-2">Report Author</p>
                                        <h3 className="text-3xl font-black text-white tracking-tight">Zakaria Cheloufi</h3>
                                        <div className="flex items-center justify-center md:justify-start gap-2 text-indigo-400 mt-2 font-black">
                                            <Icons.Mail />
                                            <a href="mailto:Zakaria@pallettoo.com" className="text-sm hover:text-white transition-colors underline decoration-indigo-800 underline-offset-4">Zakaria@pallettoo.com</a>
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-10 md:mt-0 text-center md:text-right z-10">
                                    <p className="text-white font-black text-xl uppercase tracking-tighter">Pallettoo Factory</p>
                                    <p className="text-slate-400 text-xs font-bold mt-1 uppercase tracking-[0.3em]">© 2026 GOSN Industry Co. KSA</p>
                                    <div className="flex justify-center md:justify-end gap-2 mt-6">
                                        <div className="w-12 h-1.5 bg-indigo-500 rounded-full"></div>
                                        <div className="w-3 h-1.5 bg-indigo-900 rounded-full"></div>
                                        <div className="w-3 h-1.5 bg-indigo-900 rounded-full"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
